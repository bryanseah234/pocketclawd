name: CI

on:
  push:
    branches: [main, staging, develop, "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, staging, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (cloud + modules)
        run: npx eslint src/cloud/ src/modules/

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest run src/cloud

  sub-agent-test:
    name: Sub-Agent Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container/sub-agent
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        env:
          AWS_REGION: ap-southeast-1
        run: |
          PYTHONPATH=. pytest tests/ -v --tb=short




  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  k6-smoke:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [test]
    # Only run on pushes to feature branches (not PRs — live instance needed)
    if: github.event_name == 'push' && contains(github.ref, 'feature/nanoclaw')
    steps:
      - uses: actions/checkout@v6
      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run k6 smoke test
        run: k6 run tests/load/k6-smoke.js --env TARGET_URL=http://3.0.132.150:3000
      - name: Run k6 C-12 load test (50 VUs, 2 min)
        timeout-minutes: 6
        run: k6 run tests/load/k6-load-c12.js --env BASE_URL=http://3.0.132.150:3000

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          soft_fail: false

  secrets-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Free gitleaks CLI (Docker image) — no license required, unlike
      # gitleaks/gitleaks-action@v2 which now gates org repos behind a paid key.
      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --verbose \
            --report-format=sarif --report-path=/repo/gitleaks.sarif
      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore


