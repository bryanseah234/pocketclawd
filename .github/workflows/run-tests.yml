name: Backend API & Prepdocslib Tests

on:
  pull_request:
    branches:
      - main
      - staging

env:
  CI: "true"

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      prepdocslib_changed: ${{ steps.detect.outputs.prepdocslib_changed }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          # Ensure we have the actual PR commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Relevant Changes
        id: detect
        run: |
          # Compare PR head to its base
          git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

          # List changed files (added or modified)
          CHANGED_FILES="$(git diff --name-only --diff-filter=AM HEAD origin/${{ github.base_ref }})"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          backend_changed=false
          prepdocslib_changed=false

          if echo "$CHANGED_FILES" | grep -qE '^app/backend/'; then
            backend_changed=true
          fi

          if echo "$CHANGED_FILES" | grep -qE '^app/backend/prepdocslib/'; then
            prepdocslib_changed=true
          fi

          echo "backend_changed=$backend_changed"         >> "$GITHUB_OUTPUT"
          echo "prepdocslib_changed=$prepdocslib_changed" >> "$GITHUB_OUTPUT"

  test-api:
    name: Run API Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Ensure we have the actual PR commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install uv
          uv sync --group test --no-dev

      - name: Run API Tests
        run: |
          uv run bash scripts/test_api.sh

  test-prepdocslib:
    name: Run Prepdocslib Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.prepdocslib_changed == 'true' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Ensure we have the actual PR commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install uv
          uv sync --group test --no-dev

      - name: Run Prepdocslib Tests
        run: |
          uv run bash scripts/test_prepdocslib.sh
