name: Deploy Feature Branch

# Fires on every push to feature/nanoclaw-aws-deployment.
# Builds both Docker images, pushes to ECR, redeploys on EC2 via SSM.

on:
  push:
    branches:
      - "feature/nanoclaw-aws-deployment"

concurrency:
  group: deploy-feature-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_ORCHESTRATOR: nanoclaw/orchestrator
  ECR_AGENT: nanoclaw/agent
  INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
  NODE_VERSION: "22"

jobs:
  check:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm exec vitest run

  build:
    name: Build & Push to ECR
    needs: check
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build & push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.orchestrator
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_ORCHESTRATOR }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_ORCHESTRATOR }}:feature-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push agent
        uses: docker/build-push-action@v6
        with:
          context: container/sub-agent
          file: container/sub-agent/Dockerfile.production
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_AGENT }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_AGENT }}:feature-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "ECR='$ECR_REGISTRY'",
              "TAG='$IMAGE_TAG'",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR",
              "docker pull $ECR/nanoclaw/orchestrator:$TAG",
              "docker tag $ECR/nanoclaw/orchestrator:$TAG nanoclaw-orchestrator:current",
              "docker stop nanoclaw-orchestrator 2>/dev/null || true",
              "docker rm nanoclaw-orchestrator 2>/dev/null || true",
              "ROLE=$(curl -sf http://169.254.169.254/latest/meta-data/iam/security-credentials/)",
              "CREDS=$(curl -sf http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE)",
              "AKI=$(echo $CREDS | python3 -c '\''import sys,json;d=json.load(sys.stdin);print(d[\"AccessKeyId\"])'\'') ",
              "SAK=$(echo $CREDS | python3 -c '\''import sys,json;d=json.load(sys.stdin);print(d[\"SecretAccessKey\"])'\'') ",
              "TOK=$(echo $CREDS | python3 -c '\''import sys,json;d=json.load(sys.stdin);print(d[\"Token\"])'\'') ",
              "docker run -d --name nanoclaw-orchestrator --restart unless-stopped --network host --user root -e NANOCLAW_ENV=cloud -e AWS_REGION=${{ env.AWS_REGION }} -e AWS_ACCESS_KEY_ID=$AKI -e AWS_SECRET_ACCESS_KEY=$SAK -e AWS_SESSION_TOKEN=$TOK -e ADMIN_USER=admin -e ADMIN_PASS='\''NcLaw$2026!xK9m'\'' -v /var/run/docker.sock:/var/run/docker.sock -v $(which docker):/usr/local/bin/docker:ro -v /opt/nanoclaw-data:/app/data nanoclaw-orchestrator:current",
              "sleep 20",
              "curl -sf http://localhost:3000/health && echo HEALTHY || (docker logs nanoclaw-orchestrator --tail 30 2>&1; exit 1)"
            ]' \
            --timeout-seconds 300 \
            --region ${{ env.AWS_REGION }} \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" --output text 2>/dev/null || echo Pending)
            echo "  [$i/30] $STATUS"
            [ "$STATUS" = "Success" ] && echo "Deploy OK" && break
            if [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" --instance-id "${{ env.INSTANCE_ID }}" \
                --region ${{ env.AWS_REGION }} --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done

      - name: Health check
        run: |
          for i in $(seq 1 8); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "http://3.0.132.150:3000/health" || echo 000)
            [ "$STATUS" = "200" ] && echo "Health OK (attempt $i)" && exit 0
            echo "  attempt $i: $STATUS — waiting 15s"; sleep 15
          done
          echo "Health check failed" && exit 1

      - name: Summary
        if: success()
        run: |
          echo "## Deployed to EC2" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ needs.build.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: http://3.0.132.150:3000/admin  (Basic auth: admin / NcLaw\$2026!xK9m)" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
