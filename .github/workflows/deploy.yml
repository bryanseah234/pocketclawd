name: Deploy

on:
  push:
    branches: [main, staging]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_ORCHESTRATOR: nanoclaw/orchestrator
  ECR_AGENT: nanoclaw/agent
  COVERAGE_THRESHOLD: 80

jobs:
  # ─── Stage 1: Quality Gates ───────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test (80% coverage gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "
            const summary = require('./coverage/coverage-summary.json');
            const { lines, statements, branches, functions } = summary.total;
            const avg = (lines.pct + statements.pct + branches.pct + functions.pct) / 4;
            console.log(Math.floor(avg));
          ")
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
            echo "::error::Coverage ${COVERAGE}% is below the required ${COVERAGE_THRESHOLD}%"
            exit 1
          fi

  security-scan:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          soft_fail: false

  # ─── Stage 2: Build & Push Docker Images ──────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: [lint, typecheck, test, security-scan]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      orchestrator-image: ${{ steps.meta.outputs.orchestrator-image }}
      agent-image: ${{ steps.meta.outputs.agent-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG="${GITHUB_SHA::8}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "orchestrator-image=${ECR_REGISTRY}/${ECR_ORCHESTRATOR}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "agent-image=${ECR_REGISTRY}/${ECR_AGENT}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Build orchestrator image
        run: |
          docker build \
            -f Dockerfile.orchestrator \
            -t ${{ steps.meta.outputs.orchestrator-image }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_ORCHESTRATOR }}:latest \
            .

      - name: Build agent image
        run: |
          docker build \
            -f container/sub-agent/Dockerfile \
            -t ${{ steps.meta.outputs.agent-image }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_AGENT }}:latest \
            .

      - name: Push orchestrator image
        run: |
          docker push ${{ steps.meta.outputs.orchestrator-image }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_ORCHESTRATOR }}:latest

      - name: Push agent image
        run: |
          docker push ${{ steps.meta.outputs.agent-image }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_AGENT }}:latest

  # ─── Stage 3: Deploy to Staging ───────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to staging instance via SSM
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export AWS_REGION=${{ env.AWS_REGION }}',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${IMAGE_TAG}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${IMAGE_TAG}',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${IMAGE_TAG} nanoclaw-orchestrator:current',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${IMAGE_TAG} nanoclaw-agent:current',
              'sudo systemctl restart nanoclaw-orchestrator'
            ]" \
            --output text \
            --query "Command.CommandId"

      - name: Wait for deployment to stabilize
        run: sleep 30

  # ─── Stage 4: Smoke Test ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Staging)
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests against staging
        env:
          STAGING_HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          echo "Checking health endpoint..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_HEALTH_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: status=${STATUS}, retrying in 15s..."
            sleep 15
          done
          echo "::error::Smoke test failed — health endpoint did not return 200 after 10 attempts"
          exit 1

  # ─── Stage 5: Promote to Production ───────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [smoke-test, build-and-push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Record current image tag for rollback
        id: rollback-info
        env:
          INSTANCE_ID: ${{ secrets.PRODUCTION_INSTANCE_ID }}
        run: |
          PREV_TAG=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker inspect nanoclaw-orchestrator:current --format={{.Id}} 2>/dev/null || echo none"]' \
            --output text \
            --query "Command.CommandId")
          echo "prev-command-id=${PREV_TAG}" >> "$GITHUB_OUTPUT"

          # Store current tag in SSM Parameter for rollback reference
          aws ssm put-parameter \
            --name "/nanoclaw/production/previous-image-tag" \
            --value "$(aws ssm get-parameter --name /nanoclaw/production/current-image-tag --query Parameter.Value --output text 2>/dev/null || echo 'none')" \
            --type String \
            --overwrite

          aws ssm put-parameter \
            --name "/nanoclaw/production/current-image-tag" \
            --value "${{ needs.build-and-push.outputs.image-tag }}" \
            --type String \
            --overwrite

      - name: Deploy to production instance via SSM
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          INSTANCE_ID: ${{ secrets.PRODUCTION_INSTANCE_ID }}
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export AWS_REGION=${{ env.AWS_REGION }}',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${IMAGE_TAG}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${IMAGE_TAG}',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${IMAGE_TAG} nanoclaw-orchestrator:current',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${IMAGE_TAG} nanoclaw-agent:current',
              'sudo systemctl restart nanoclaw-orchestrator'
            ]" \
            --output text \
            --query "Command.CommandId"

      - name: Health check with automatic rollback
        env:
          INSTANCE_ID: ${{ secrets.PRODUCTION_INSTANCE_ID }}
          PRODUCTION_HEALTH_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
        run: |
          echo "Monitoring production health for 10 minutes..."
          CHECKS_PASSED=0
          CHECKS_REQUIRED=5
          TOTAL_CHECKS=20
          CHECK_INTERVAL=30

          for i in $(seq 1 $TOTAL_CHECKS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_HEALTH_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              CHECKS_PASSED=$((CHECKS_PASSED + 1))
              echo "Check ${i}/${TOTAL_CHECKS}: PASS (${CHECKS_PASSED}/${CHECKS_REQUIRED} required)"
            else
              echo "Check ${i}/${TOTAL_CHECKS}: FAIL (status=${STATUS})"
              CHECKS_PASSED=0
            fi

            if [ "$CHECKS_PASSED" -ge "$CHECKS_REQUIRED" ]; then
              echo "Production deployment healthy — ${CHECKS_PASSED} consecutive checks passed"
              exit 0
            fi

            sleep $CHECK_INTERVAL
          done

          echo "::error::Production health check failed — initiating rollback"

          # Rollback to previous image tag
          PREV_TAG=$(aws ssm get-parameter \
            --name "/nanoclaw/production/previous-image-tag" \
            --query "Parameter.Value" \
            --output text)

          if [ "$PREV_TAG" = "none" ] || [ -z "$PREV_TAG" ]; then
            echo "::error::No previous image tag available for rollback"
            exit 1
          fi

          echo "Rolling back to previous tag: ${PREV_TAG}"
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'export AWS_REGION=${{ env.AWS_REGION }}',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${PREV_TAG}',
              'docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${PREV_TAG}',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_ORCHESTRATOR }}:${PREV_TAG} nanoclaw-orchestrator:current',
              'docker tag ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_AGENT }}:${PREV_TAG} nanoclaw-agent:current',
              'sudo systemctl restart nanoclaw-orchestrator'
            ]" \
            --output text

          # Restore the SSM parameter
          aws ssm put-parameter \
            --name "/nanoclaw/production/current-image-tag" \
            --value "$PREV_TAG" \
            --type String \
            --overwrite

          exit 1
