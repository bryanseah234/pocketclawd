services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clawd-pg
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: clawd
      POSTGRES_DB: clawd
      POSTGRES_HOST_AUTH_METHOD: trust # localhost-only, no password
      # PRODUCTION: replace the line above with:
      #   POSTGRES_PASSWORD: <strong-random-password>
      # and remove POSTGRES_HOST_AUTH_METHOD entirely.
    volumes:
      - clawd-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "clawd"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clawd-pg-data:
