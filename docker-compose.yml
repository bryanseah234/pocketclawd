services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pocketclaw-pg
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: pocketclaw
      POSTGRES_DB: pocketclaw
      POSTGRES_HOST_AUTH_METHOD: trust # localhost-only, no password
      # PRODUCTION: replace the line above with:
      #   POSTGRES_PASSWORD: <strong-random-password>
      # and remove POSTGRES_HOST_AUTH_METHOD entirely.
    volumes:
      - pocketclaw-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pocketclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pocketclaw-pg-data:
