  <text x="840.0" y="166.0" text-anchor="middle" class="sub" fill="#22d3ee">nanoclaw-sub-agent</text>
  <text x="840.0" y="179.0" text-anchor="middle" class="tiny" fill="#94a3b8">rolling 2 tasks</text>

  <rect x="980" y="120" width="160" height="80" rx="8" fill="#0f172a"/>
  <rect x="980" y="120" width="160" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1060.0" y="156.0" text-anchor="middle" class="nm" fill="#f1f5f9">Live</text>
  <text x="1060.0" y="172.0" text-anchor="middle" class="sub" fill="#22d3ee">prod traffic</text>

  <line x1="240" y1="160" x2="298" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="480" y1="160" x2="518" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="700" y1="160" x2="738" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="940" y1="160" x2="978" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="300" y="300" class="stl" fill="#34d399">Orchestrator lane (EC2, manual)</text>
  <rect x="300" y="310" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="300" y="310" width="180" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="390.0" y="341.0" text-anchor="middle" class="nm" fill="#f1f5f9">SSM session</text>
  <text x="390.0" y="356.0" text-anchor="middle" class="sub" fill="#34d399">aws ssm</text>
  <text x="390.0" y="369.0" text-anchor="middle" class="tiny" fill="#94a3b8">start-session</text>

  <rect x="520" y="310" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="520" y="310" width="180" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="610.0" y="341.0" text-anchor="middle" class="nm" fill="#f1f5f9">On EC2</text>
  <text x="610.0" y="356.0" text-anchor="middle" class="sub" fill="#34d399">git pull · pnpm</text>
  <text x="610.0" y="369.0" text-anchor="middle" class="tiny" fill="#94a3b8">build</text>

  <rect x="740" y="310" width="200" height="80" rx="8" fill="#0f172a"/>
  <rect x="740" y="310" width="200" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="840.0" y="346.0" text-anchor="middle" class="nm" fill="#f1f5f9">systemctl</text>
  <text x="840.0" y="362.0" text-anchor="middle" class="sub" fill="#34d399">restart nanoclaw</text>

  <rect x="980" y="310" width="160" height="80" rx="8" fill="#0f172a"/>
  <rect x="980" y="310" width="160" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1060.0" y="346.0" text-anchor="middle" class="nm" fill="#f1f5f9">Live</text>
  <text x="1060.0" y="362.0" text-anchor="middle" class="sub" fill="#34d399">prod traffic</text>

  <line x1="150" y1="200" x2="150" y2="350" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="150.0" y="279.0" text-anchor="middle" class="tiny" fill="#cbd5e1">src/** change</text>

  <line x1="240" y1="350" x2="298" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="480" y1="350" x2="518" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="700" y1="350" x2="738" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="940" y1="350" x2="978" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="150" y1="200" x2="300" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265.0" y="176.0" text-anchor="middle" class="tiny" fill="#cbd5e1">container/sub-agent/** change</text>

  <rect x="300" y="440" width="840" height="70" rx="8" fill="#0f172a"/>
  <rect x="300" y="440" width="840" height="70" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="720.0" y="466.0" text-anchor="middle" class="nm" fill="#f1f5f9">Manual fallback (CI billing-blocked)</text>
  <text x="720.0" y="481.0" text-anchor="middle" class="sub" fill="#fb7185">docker build → tag (plain concat, never -f) → ECR push → force-redeploy nanoclaw-sub-agent + nanoclaw-indexer → verify digest</text>
  <text x="720.0" y="494.0" text-anchor="middle" class="tiny" fill="#94a3b8">see docs/deployment.md</text>

</svg>