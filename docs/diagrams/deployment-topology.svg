<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker>
    <style>text{font-family:'JetBrains Mono','Consolas',monospace}
      .nm{font-size:13px;font-weight:700} .sub{font-size:9.5px} .tiny{font-size:8px}
      .ttl{font-size:20px;font-weight:700} .stl{font-size:11px}</style></defs>
  <rect width="1200" height="560" fill="#020617"/>
  <rect width="1200" height="560" fill="url(#grid)"/>
  <circle cx="34" cy="34" r="6" fill="#34d399"/>
  <text x="50" y="40" class="ttl" fill="#f1f5f9">Deployment — code to production</text>
  <text x="50" y="62" class="stl" fill="#94a3b8">Sub-agent ships via container image; orchestrator ships via git pull on EC2.</text>
  <rect x="60" y="120" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="60" y="120" width="180" height="80" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150.0" y="151.0" text-anchor="middle" class="nm" fill="#f1f5f9">git push</text>
  <text x="150.0" y="166.0" text-anchor="middle" class="sub" fill="#94a3b8">feature/nanoclaw-</text>
  <text x="150.0" y="179.0" text-anchor="middle" class="tiny" fill="#94a3b8">aws-deployment</text>

  <text x="300" y="112" class="stl" fill="#22d3ee">Sub-agent lane (container)</text>
  <rect x="300" y="120" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="300" y="120" width="180" height="80" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="390.0" y="151.0" text-anchor="middle" class="nm" fill="#f1f5f9">CI</text>
  <text x="390.0" y="166.0" text-anchor="middle" class="sub" fill="#34d399">lint · vitest</text>
  <text x="390.0" y="179.0" text-anchor="middle" class="tiny" fill="#94a3b8">pytest · k6</text>

  <rect x="520" y="120" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="520" y="120" width="180" height="80" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="610.0" y="151.0" text-anchor="middle" class="nm" fill="#f1f5f9">Build + push</text>
  <text x="610.0" y="166.0" text-anchor="middle" class="sub" fill="#fbbf24">docker → ECR</text>
  <text x="610.0" y="179.0" text-anchor="middle" class="tiny" fill="#94a3b8">latest + SHA tags</text>

  <rect x="740" y="120" width="200" height="80" rx="8" fill="#0f172a"/>
