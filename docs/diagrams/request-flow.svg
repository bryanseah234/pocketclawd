<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" width="1180" height="720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono','Consolas',monospace; }
      .nm{font-size:13px;font-weight:700} .sub{font-size:9.5px} .tiny{font-size:8px}
      .ttl{font-size:20px;font-weight:700} .stl{font-size:11px} .mono{font-size:9px}
    </style>
  </defs>
  <rect width="1180" height="720" fill="#020617"/>
  <rect width="1180" height="720" fill="url(#grid)"/>
  <circle cx="34" cy="34" r="6" fill="#22d3ee"/>
  <text x="50" y="40" class="ttl" fill="#f1f5f9">Request Flow — message in, reply out</text>
  <text x="50" y="62" class="stl" fill="#94a3b8">Inbound (left) and reply (right) share the same components; communication is Redis-only.</text>
  <rect x="320" y="95" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="95" width="420" height="52" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="530.0" y="117.0" text-anchor="middle" class="nm" fill="#f1f5f9">User</text>
  <text x="530.0" y="133.0" text-anchor="middle" class="sub" fill="#94a3b8">WhatsApp / Telegram</text>

  <rect x="320" y="160" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="160" width="420" height="52" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="530.0" y="182.0" text-anchor="middle" class="nm" fill="#f1f5f9">Channel Adapter</text>
  <text x="530.0" y="198.0" text-anchor="middle" class="sub" fill="#34d399">whatsapp.ts / telegram.ts  (EC2)</text>

  <line x1="530.0" y1="147" x2="530.0" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="225" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="225" width="420" height="52" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="530.0" y="247.0" text-anchor="middle" class="nm" fill="#f1f5f9">Router</text>
  <text x="530.0" y="263.0" text-anchor="middle" class="sub" fill="#34d399">router.ts — resolve user → session</text>

  <line x1="530.0" y1="212" x2="530.0" y2="225" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="290" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="290" width="420" height="52" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="530.0" y="312.0" text-anchor="middle" class="nm" fill="#f1f5f9">Redis</text>
  <text x="530.0" y="328.0" text-anchor="middle" class="sub" fill="#fb923c">LPUSH queue:agent:dispatch</text>

  <line x1="530.0" y1="277" x2="530.0" y2="290" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="355" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="355" width="420" height="52" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="530.0" y="377.0" text-anchor="middle" class="nm" fill="#f1f5f9">Sub-Agent</text>
  <text x="530.0" y="393.0" text-anchor="middle" class="sub" fill="#22d3ee">main.py — BRPOP, RAG, tool loop, Bedrock</text>

  <line x1="530.0" y1="342" x2="530.0" y2="355" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="420" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="420" width="420" height="52" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="530.0" y="442.0" text-anchor="middle" class="nm" fill="#f1f5f9">Redis</text>
  <text x="530.0" y="458.0" text-anchor="middle" class="sub" fill="#fb923c">LPUSH queue:orchestrator:responses</text>

  <line x1="530.0" y1="407" x2="530.0" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="485" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="485" width="420" height="52" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="530.0" y="507.0" text-anchor="middle" class="nm" fill="#f1f5f9">Delivery poller</text>
  <text x="530.0" y="523.0" text-anchor="middle" class="sub" fill="#34d399">delivery.ts — detect kind, dispatch</text>

  <line x1="530.0" y1="472" x2="530.0" y2="485" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="550" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="550" width="420" height="52" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="530.0" y="572.0" text-anchor="middle" class="nm" fill="#f1f5f9">Channel Adapter</text>
  <text x="530.0" y="588.0" text-anchor="middle" class="sub" fill="#34d399">sendMessage / sendPhoto / sendDocument</text>

  <line x1="530.0" y1="537" x2="530.0" y2="550" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="615" width="420" height="52" rx="8" fill="#0f172a"/>
  <rect x="320" y="615" width="420" height="52" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="530.0" y="637.0" text-anchor="middle" class="nm" fill="#f1f5f9">User</text>
  <text x="530.0" y="653.0" text-anchor="middle" class="sub" fill="#94a3b8">receives reply</text>

  <line x1="530.0" y1="602" x2="530.0" y2="615" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="355" width="210" height="52" rx="8" fill="#0f172a"/>
  <rect x="60" y="355" width="210" height="52" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="165.0" y="377.0" text-anchor="middle" class="nm" fill="#f1f5f9">OpenSearch</text>
  <text x="165.0" y="393.0" text-anchor="middle" class="sub" fill="#a78bfa">vector + BM25 search</text>

  <rect x="870" y="355" width="250" height="52" rx="8" fill="#0f172a"/>
  <rect x="870" y="355" width="250" height="52" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="995.0" y="377.0" text-anchor="middle" class="nm" fill="#f1f5f9">Bedrock</text>
  <text x="995.0" y="393.0" text-anchor="middle" class="sub" fill="#fbbf24">Claude Sonnet 4.5 + Titan embed</text>

  <rect x="60" y="425" width="210" height="52" rx="8" fill="#0f172a"/>
  <rect x="60" y="425" width="210" height="52" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="165.0" y="447.0" text-anchor="middle" class="nm" fill="#f1f5f9">DynamoDB</text>
  <text x="165.0" y="463.0" text-anchor="middle" class="sub" fill="#a78bfa">chat history + prefs</text>

  <rect x="870" y="425" width="250" height="52" rx="8" fill="#0f172a"/>
  <rect x="870" y="425" width="250" height="52" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="995.0" y="447.0" text-anchor="middle" class="nm" fill="#f1f5f9">S3</text>
  <text x="995.0" y="463.0" text-anchor="middle" class="sub" fill="#fbbf24">fetch images / store media</text>

  <line x1="270" y1="381" x2="320" y2="381" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <line x1="870" y1="381" x2="740" y2="381" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <line x1="270" y1="451" x2="320" y2="425" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <line x1="870" y1="451" x2="740" y2="425" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <text x="1160" y="706" text-anchor="end" class="tiny" fill="#475569">no direct IPC · two processes · Redis is the only IO surface</text>
</svg>